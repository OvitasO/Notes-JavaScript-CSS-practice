<!DOCTYPE html>
<html>
  <head>
    <title>ToDo list</title>
    <link rel="Stylesheet" href="ToDo.css">
    <script src="Todo.js" defer></script>
  </head>
  <body>
    <div class="Heading">
    <h1>ToDo list</h1>
    </div>
    <div class="addContainer">
      <input class="taskInput" id="InputElem" placeholder="type a note" maxlength="100">
      <button class="AddTask" id="AddElem">Add</button>
    </div>
    <div class="notesFlex">
    <p class="empty" id="emptyElem"></p>
    <div id="notesDisplay" class="notesGrid"></div>
    </div>
  </body>
</html>
